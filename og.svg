<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="teal-spot" cx="80%" cy="15%" r="50%">
      <stop offset="0%" stop-color="#0FB5AE" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0FB5AE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sand-spot" cx="12%" cy="88%" r="45%">
      <stop offset="0%" stop-color="#E8A766" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#E8A766" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0E2440"/>
  <rect width="1200" height="630" fill="url(#teal-spot)"/>
  <rect width="1200" height="630" fill="url(#sand-spot)"/>

  <!-- A monogram: same paths as favicon, scaled to ~120px, centered ~x=600 y=200 -->
  <g transform="translate(540,130) scale(1.25)">
    <path d="M26 74 L48 26 L70 74" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M37 56 L59 56" stroke="#0FB5AE" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- AQOON wordmark -->
  <text x="600" y="330" font-family="Georgia, serif" font-weight="900" font-size="88" fill="#ffffff" text-anchor="middle" letter-spacing="6">AQOON</text>

  <!-- tagline -->
  <text x="600" y="418" font-family="Georgia, serif" font-weight="400" font-style="italic" font-size="32" fill="#FBFAF7" text-anchor="middle" opacity="0.88">Apu on jo olemassa. Me viemme sen perille.</text>

  <!-- teal underline accent under tagline -->
  <line x1="480" y1="438" x2="720" y2="438" stroke="#0FB5AE" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>
